version: '3.8'

services:
  # Backend - Go API server
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: llm-viz-backend
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - llm-viz-network
    restart: unless-stopped

  # Frontend - Next.js dashboard
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: llm-viz-frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://localhost:8080
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - llm-viz-network
    restart: unless-stopped

networks:
  llm-viz-network:
    driver: bridge
